<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>SongKart - Licensed Music Marketplace</title>
    <meta name="description" content="Buy legally licensed songs, lyrics, and compositions for your projects. Instant downloads, verified sellers, and full legal protection." />
    <meta name="author" content="SongKart" />

    <!-- Preconnect to critical third-party origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Precheck -->
    <link rel="dns-prefetch" href="https://sdk.cashfree.com" />

    <!-- Preload LCP font file for faster text rendering -->
    <link rel="preload" 
          href="https://fonts.gstatic.com/s/outfit/v11/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC1O4a0EwItq6fNIg.woff2" 
          as="font" 
          type="font/woff2" 
          crossorigin />

    <!-- Non-blocking font loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" as="style" />
    <link rel="stylesheet" 
          href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
          media="print" 
          onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    </noscript>

    <meta property="og:title" content="SongKart - Licensed Music Marketplace" />
    <meta property="og:description" content="SongKart - Licensed Music Marketplace" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SongKart" />
    <meta name="twitter:image" content="/favicon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Cashfree Payment Gateway SDK - Deferred loading -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js" defer></script>
  </body>
</html>
